<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <br>

    <label for="x">v1 x:</label>
    <input type="number" id="x1">
    <label for="y">y:</label>
    <input type="number" id="y1">
    <br>
    <label for="x">v2 x:</label>
    <input type="number" id="x2">
    <label for="y">y:</label>
    <input type="number" id="y2">
    <br>
    <input type="button" id="drawVectors" value="Draw"></input> 
    <br>
    <br>
    <label for="operations">Operation: </label>
    <select name="operations" id="operations">
      <option value="add">Add</option>
      <option value="subtract">Subtract</option>
      <option value="multiply">Multiply</option>
      <option value="divide">Divide</option>
      <option value="angleBetween">Angle Between</option>
      <option value="area">Area</option>
      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>
    </select>
    <label>Scalar: </label>
    <input type="number" id="scalar"></input>
    <br>
    <input type="button" id="drawOperation" value="Draw"></input> 
    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
  </body>
</html>
