<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Base grass green -->
  <rect width="128" height="128" fill="#5a8a35"/>

  <!-- Darker patches for natural variation -->
  <rect x="0"   y="0"   width="40" height="40" fill="#4e7a2a" opacity="0.4"/>
  <rect x="80"  y="20"  width="48" height="35" fill="#4e7a2a" opacity="0.3"/>
  <rect x="20"  y="70"  width="35" height="40" fill="#4e7a2a" opacity="0.35"/>
  <rect x="90"  y="85"  width="38" height="43" fill="#4e7a2a" opacity="0.4"/>

  <!-- Lighter patches -->
  <rect x="50"  y="10"  width="30" height="25" fill="#6aaa40" opacity="0.35"/>
  <rect x="5"   y="55"  width="28" height="22" fill="#6aaa40" opacity="0.3"/>
  <rect x="70"  y="60"  width="35" height="28" fill="#6aaa40" opacity="0.35"/>
  <rect x="30"  y="95"  width="45" height="28" fill="#6aaa40" opacity="0.3"/>

  <!-- Small grass tufts (dots) -->
  <rect x="12"  y="15"  width="4" height="3" fill="#3a6a20" opacity="0.5"/>
  <rect x="55"  y="8"   width="3" height="4" fill="#7aba50" opacity="0.45"/>
  <rect x="100" y="30"  width="4" height="3" fill="#3a6a20" opacity="0.5"/>
  <rect x="35"  y="45"  width="3" height="4" fill="#7aba50" opacity="0.4"/>
  <rect x="75"  y="40"  width="4" height="3" fill="#3a6a20" opacity="0.5"/>
  <rect x="10"  y="80"  width="3" height="4" fill="#7aba50" opacity="0.4"/>
  <rect x="60"  y="75"  width="4" height="3" fill="#3a6a20" opacity="0.5"/>
  <rect x="110" y="70"  width="3" height="4" fill="#7aba50" opacity="0.45"/>
  <rect x="40"  y="110" width="4" height="3" fill="#3a6a20" opacity="0.5"/>
  <rect x="90"  y="105" width="3" height="4" fill="#7aba50" opacity="0.4"/>
  <rect x="18"  y="120" width="4" height="3" fill="#3a6a20" opacity="0.5"/>
  <rect x="70"  y="115" width="3" height="4" fill="#7aba50" opacity="0.45"/>
</svg>
